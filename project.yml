name: LiveCoach
options:
  bundleIdPrefix: com.konradgnat
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "DHB5JNF8ZW"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_ALLOWED: YES
    GENERATE_INFOPLIST_FILE: NO
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "10.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.0.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "4.0.0"
targets:
  LiveCoach:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LiveCoach
        excludes:
          - "Info.plist"
          - "GoogleService-Info.plist"
    resources:
      - path: LiveCoach/Assets.xcassets
      - path: LiveCoach/GoogleService-Info.plist
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseMessaging
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: RevenueCat
        product: RevenueCat
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.konradgnat.livecoach
        PRODUCT_NAME: LiveCoach
        INFOPLIST_FILE: LiveCoach/Info.plist
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_STRICT_CONCURRENCY: complete
  LiveCoachTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LiveCoachTests
    dependencies:
      - target: LiveCoach
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.konradgnat.livecoach.tests
        GENERATE_INFOPLIST_FILE: YES
