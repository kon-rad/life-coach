<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<script>
// Suppress unhandled rejections that come from browser extensions injected
// into the preview (e.g. MetaMask). Registered as early as possible.
window.addEventListener('unhandledrejection', (e) => {
  const r = e.reason;
  const s = String(r && (r.stack || r.message || r) || '');
  if (/MetaMask|chrome-extension|moz-extension/i.test(s) || (r && typeof r === 'object' && Object.keys(r).length === 0)) {
    e.preventDefault();
    e.stopImmediatePropagation();
  }
}, true);
</script>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<link rel="preconnect" href="https://fonts.googleapis.com">

  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: #07070a; color: #fff;

    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  #root { width: 100%; height: 100%; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  textarea, input { font-family: inherit; }
  @keyframes fade-in { from { opacity: 0 } to { opacity: 1 } }
  @keyframes sheet-up { from { transform: translateY(100%) } to { transform: translateY(0) } }
  @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.4 } }
</style>
</head>
